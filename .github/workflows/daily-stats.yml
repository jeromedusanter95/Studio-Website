name: Daily stats update

on:
  schedule:
    # 06:00 UTC daily. Late enough for App Store Connect's ~24h lag.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/fetch-stats/package-lock.json

      - name: Install dependencies
        working-directory: scripts/fetch-stats
        run: npm ci

      - name: Fetch stats
        working-directory: scripts/fetch-stats
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PLAY_PACKAGE_NAMES: ${{ secrets.PLAY_PACKAGE_NAMES }}
          ADMOB_PUBLISHER_ID: ${{ secrets.ADMOB_PUBLISHER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}
          ASC_APP_IDS: ${{ secrets.ASC_APP_IDS }}
        run: node index.js

      - name: Commit updated data
        run: |
          git config user.name "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add stats-history.json stats-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(stats): daily update [skip ci]"
            git push
          fi
